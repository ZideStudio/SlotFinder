name: Back Build

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  merge_group:
    branches: ["main"]

env:
  BACK_FOLDER: ./back

jobs:
  detect-changes:
    name: Detect Back Changes
    runs-on: ubuntu-latest
    outputs:
      back: ${{ steps.filter.outputs.back }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for back file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            back:
              - 'back/**'
              - '.github/workflows/back-build.yaml'
              - '.github/actions/setup-go/**'
              - 'Makefile'

  install:
    name: Back Install dependencies
    needs: detect-changes
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Install dependencies
        working-directory: ${{ env.BACK_FOLDER }}
        run: go mod download

  lint:
    name: Back Lint code
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Run vet
        working-directory: ${{ env.BACK_FOLDER }}
        run: go vet ./...

  test:
    name: Back Test
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Run tests
        working-directory: ${{ env.BACK_FOLDER }}
        run: go test -v ./... -race -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage reports
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          file: ${{ env.BACK_FOLDER }}/coverage.txt
          flags: backend

  build:
    name: Back Build
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Build
        working-directory: ${{ env.BACK_FOLDER }}
        run: go build -v ./...

  swaggo:
    name: Back Check Swagger documentation build
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger documentation
        working-directory: ${{ env.BACK_FOLDER }}
        run: |
          go tool swag init
          sed -i '/LeftDelim/d; /RightDelim/d' docs/docs.go
