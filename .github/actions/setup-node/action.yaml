name: 'setup-node'
description: 'setup node'

runs:
  using: 'composite'
  steps:
    - name: Set Node.js version from mise
      shell: bash
      run: echo "NODE_VERSION=$(grep -oP '^\s*node\s*=\s*"\K[^"]+' front/.mise.toml)" >> $GITHUB_ENV

    - name: Get npm version from mise
      shell: bash
      run: echo "NPM_VERSION=$(grep -oP '^\s*npm\s*=\s*"\K[^"]+' front/.mise.toml)" >> $GITHUB_ENV

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup npm version
      if: ${{ env.NPM_VERSION }}
      shell: bash
      run: npm install -g npm@${{ env.NPM_VERSION }}

    - name: Cache node modules
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: front/node_modules
        key: npm-${{ runner.os }}-modules-${{ hashFiles('front/package-lock.json') }}
