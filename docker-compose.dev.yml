services:
  traefik:
    build:
      context: ./docker
      dockerfile: Dockerfile.traefik
    command:
      - --api.insecure=true
      - --providers.docker=false
      - --entrypoints.http.address=:80
      - --entrypoints.https.address=:443
      - --entrypoints.http.http.redirections.entrypoint.to=https
      - --entrypoints.http.http.redirections.entrypoint.scheme=https
      - --providers.file.directory=/etc/traefik/conf.d
    volumes:
      - ./docker/traefik-dynamic.yml:/etc/traefik/conf.d/dynamic.yml:ro
    ports:
      - "80:80"
      - "443:443"
      - "9000:8080"
    restart: unless-stopped
    networks:
      - traefik

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=slotfinder
      - POSTGRES_USER=slotfinder
      - POSTGRES_PASSWORD=slotfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - traefik

  devtools:
    profiles: ["devcontainer"]
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    user: vscode
    environment:
      - GOPATH=/go
      - GOBIN=/go/bin
      - PATH=/home/vscode/.volta/bin:/usr/local/go/bin:/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./:/workspace
      - go-mod-cache:/home/vscode/go/pkg/mod
      - ~/.gitconfig:/home/vscode/.gitconfig:ro
      - ~/.ssh:/home/vscode/.ssh:ro
    working_dir: /workspace
    networks:
      - traefik

volumes:
  postgres_data:
  go-mod-cache:

networks:
  traefik:
    name: traefik
